<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta charset="UTF-8" />
  <title>Login - Sweet Delights 🍰</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>

<body class="auth-page">
  <!-- Back to Home Button -->
  <div class="back-home">
    <a href="/cakes">
      <span>🏠 Back to Home</span>
    </a>
  </div>

  <div class="auth-container">
    <!-- Header -->
    <div class="auth-header">
      <div class="auth-logo">🍰</div>
      <h1 class="auth-title">Welcome Back!</h1>
      <p class="auth-subtitle">Login to continue your sweet journey</p>
    </div>

    <!-- Alert Messages -->
    <div th:if="${param.error}" class="alert alert-error">
      ❌ Invalid username or password
    </div>
    <div th:if="${param.disabled}" class="alert alert-error">
      🔒 Account has been locked. Please contact admin.
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
      ✅ You have been logged out successfully
    </div>
    <div th:if="${param.success}" class="alert alert-success">
      🎉 Registration successful! Please login.
    </div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label for="username">👤 Username</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required
          autofocus />
      </div>

      <div class="form-group">
        <label for="password">🔐 Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password"
          required />
        <span class="password-toggle" onclick="togglePassword()">👁️</span>
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        🚀 Login Now
      </button>
    </form>

    <!-- Divider -->
    <div class="auth-divider">
      <span>OR</span>
    </div>

    <!-- Google Login -->
    <a href="/oauth2/authorization/google" class="btn google-btn btn-block">
      Login with Google
    </a>

    <!-- Footer -->
    <div class="auth-footer">
      <p>Don't have an account? <a href="/register">Register here</a></p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggle = document.querySelector('.password-toggle');

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggle.textContent = '🙈';
      } else {
        passwordInput.type = 'password';
        toggle.textContent = '👁️';
      }
    }

    // Add enter key animation
    document.querySelector('form').addEventListener('submit', function (e) {
      const btn = this.querySelector('.btn-primary');
      btn.innerHTML = '<span class="loading-spinner"></span> Logging in...';
      btn.disabled = true;
    });
  </script>
</body>

</html>
