<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Register - Sweet Delights</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .btn-block {
            width: 100%;
            display: block;
            text-align: center;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">🍰 Sweet Delights</h1>
            <nav class="nav">
                <a href="/cakes" class="nav-link">Home</a>
            </nav>
        </div>
    </header>

    <div class="auth-container">
        <h2 style="text-align: center; margin-bottom: 20px;">Register</h2>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" th:field="*{fullName}" class="form-control" placeholder="Enter full name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="Enter email" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" th:field="*{username}" class="form-control" placeholder="Choose username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" class="form-control" placeholder="Choose password"
                    required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            Already have an account? <a href="/login">Login here</a>
        </p>
    </div>
</body>

</html>
