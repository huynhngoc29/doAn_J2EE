<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8">
    <title>Register - Sweet Delights 🍰</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>

<body class="auth-page">
    <!-- Back to Home Button -->
    <div class="back-home">
        <a href="/cakes">
            <span>🏠 Back to Home</span>
        </a>
    </div>

    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <div class="auth-logo">🎂</div>
            <h1 class="auth-title">Join Sweet Delights!</h1>
            <p class="auth-subtitle">Create your account and start your sweet journey</p>
        </div>

        <!-- Register Form -->
        <form th:action="@{/register}" th:object="${user}" method="post" id="registerForm">
            <div class="form-group">
                <label for="fullName">👤 Full Name</label>
                <input type="text" id="fullName" th:field="*{fullName}" class="form-control"
                    placeholder="Enter your full name" required autofocus>
            </div>

            <div class="form-group">
                <label for="email">📧 Email</label>
                <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="Enter your email"
                    required>
            </div>

            <div class="form-group">
                <label for="username">🔑 Username</label>
                <input type="text" id="username" th:field="*{username}" class="form-control"
                    placeholder="Choose a username" required minlength="3">
                <small style="color: var(--light-text); font-size: 0.85rem;">At least 3 characters</small>
            </div>

            <div class="form-group">
                <label for="password">🔐 Password</label>
                <input type="password" id="password" th:field="*{password}" class="form-control"
                    placeholder="Choose a strong password" required minlength="6">
                <span class="password-toggle" onclick="togglePassword('password')">👁️</span>
                <small style="color: var(--light-text); font-size: 0.85rem;">At least 6 characters</small>
            </div>

            <div class="form-group">
                <label for="confirmPassword">✅ Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter your password"
                    required minlength="6">
                <span class="password-toggle" onclick="togglePassword('confirmPassword')" style="top: 42px;">👁️</span>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                🚀 Create Account
            </button>
        </form>

        <!-- Footer -->
        <div class="auth-footer">
            <p>Already have an account? <a href="/login">Login here</a></p>
        </div>
    </div>

    <script>
        function togglePassword(fieldId) {
            const passwordInput = document.getElementById(fieldId);
            const toggle = passwordInput.nextElementSibling;

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggle.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggle.textContent = '👁️';
            }
        }

        // Password validation
        document.getElementById('registerForm').addEventListener('submit', function (e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = this.querySelector('.btn-primary');

            if (password !== confirmPassword) {
                e.preventDefault();
                alert('❌ Passwords do not match!');
                return false;
            }

            btn.innerHTML = '<span class="loading-spinner"></span> Creating account...';
            btn.disabled = true;
        });

        // Real-time password match indicator
        document.getElementById('confirmPassword').addEventListener('input', function () {
            const password = document.getElementById('password').value;
            const confirmPassword = this.value;

            if (confirmPassword.length > 0) {
                if (password === confirmPassword) {
                    this.style.borderColor = '#51cf66';
                    this.style.boxShadow = '0 0 0 4px rgba(81, 207, 102, 0.1)';
                } else {
                    this.style.borderColor = '#ff6b6b';
                    this.style.boxShadow = '0 0 0 4px rgba(255, 107, 107, 0.1)';
                }
            } else {
                this.style.borderColor = '#e0e0e0';
                this.style.boxShadow = 'none';
            }
        });
    </script>
</body>

</html>
