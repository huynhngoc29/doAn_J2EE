<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Revenue Chart - Admin</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .filter-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            align-items: flex-end;
            padding-bottom: 25px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            margin-bottom: 5px;
            font-weight: 600;
        }

        .filter-group input, .filter-group select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: 400px;
            position: relative;
        }

        .btn-reload {
            padding: 9px 15px;
            cursor: pointer;
            margin-bottom: 2px;
            align-self: flex-end;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">🍰 Admin Dashboard</h1>
            <nav class="nav">
                <a href="/admin/cakes" class="nav-link">Cakes</a>
                <a href="/admin/users" class="nav-link">Users</a>
                <a href="/admin/categories" class="nav-link">Categories</a>
                <a href="/admin/orders" class="nav-link" style="display: flex; align-items: center;">Orders <span th:if="${pendingOrderCount != null && pendingOrderCount > 0}" style="height: 10px; width: 10px; background-color: red; border-radius: 50%; display: inline-block; margin-left: 5px;" th:title="${pendingOrderCount + ' pending orders'}"></span></a>
                <a href="/admin/revenue" class="nav-link">Revenue</a>
                <a href="/cakes" class="nav-link">Main Site</a>
                <a href="/logout" class="nav-link">Logout</a>
            </nav>
        </div>
    </header>

    <main class="main-content container">
        <h2 class="section-title">Revenue Chart</h2>

        <div class="filter-container">
            <div class="filter-group">
                <label for="startDate">Start Date</label>
                <input type="date" id="startDate">
            </div>
            <div class="filter-group">
                <label for="endDate">End Date</label>
                <input type="date" id="endDate">
            </div>
            <div class="filter-group">
                <label for="groupBy">Group By</label>
                <select id="groupBy">
                    <option value="DAY" selected>Day</option>
                    <option value="MONTH">Month</option>
                    <option value="YEAR">Year</option>
                </select>
            </div>
            <button class="btn btn-primary btn-reload" onclick="loadChartData()">Apply Filters</button>
        </div>

        <div class="chart-container">
            <canvas id="revenueChart"></canvas>
        </div>
    </main>

    <script>
        let revenueChartInstance = null;

        document.addEventListener('DOMContentLoaded', () => {
             // Set default dates: 30 days ago to today
             const end = new Date();
             const start = new Date();
             start.setDate(end.getDate() - 30);

             document.getElementById('endDate').value = end.toISOString().split('T')[0];
             document.getElementById('startDate').value = start.toISOString().split('T')[0];

             loadChartData();
        });

        async function loadChartData() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const groupBy = document.getElementById('groupBy').value;

            try {
                const response = await fetch(`/admin/revenue/data?startDate=${startDate}&endDate=${endDate}&groupBy=${groupBy}`);
                const data = await response.json();
                
                renderChart(data.labels, data.data);
            } catch (error) {
                console.error("Error loading chart data", error);
                alert("Failed to load revenue data.");
            }
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            
            if (revenueChartInstance) {
                revenueChartInstance.destroy();
            }

            // Create gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(255, 107, 129, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 107, 129, 0.1)');

            revenueChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Revenue (VND)',
                        data: data,
                        borderColor: '#ff6b81',
                        backgroundColor: gradient,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: '#ff4757',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let value = context.parsed.y;
                                    return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(value);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    if(value >= 1000000) {
                                        return (value / 1000000) + ' M';
                                    } else if (value >= 1000) {
                                        return (value / 1000) + ' k';
                                    }
                                    return value;
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
