<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Manage Cakes - Admin</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <header class="header">
      <div class="container">
        <h1 class="logo">🍰 Admin Dashboard</h1>
        <nav class="nav">
          <a href="/admin/users" class="nav-link">Manage Users</a>
          <a href="/admin/categories" class="nav-link">Manage Categories</a>
          <a href="/admin/orders" class="nav-link" style="display: flex; align-items: center;">Orders <span th:if="${pendingOrderCount != null && pendingOrderCount > 0}" style="height: 10px; width: 10px; background-color: red; border-radius: 50%; display: inline-block; margin-left: 5px;" th:title="${pendingOrderCount + ' pending orders'}"></span></a>
          <a href="/admin/revenue" class="nav-link">Revenue</a>
          <a href="/cakes" class="nav-link">Main Site</a>
          <a
            th:if="${#authentication != null && #authentication.name != 'anonymousUser'}"
            href="/profile"
            class="nav-link"
            >Profile / Orders</a
          >
          <a href="/logout" class="nav-link">Logout</a>
        </nav>
      </div>
    </header>

    <main class="main-content container">
      <h2 class="section-title">Manage Cakes</h2>

      <div class="admin-toolbar">
        <a href="/admin/cakes/add" class="btn btn-primary">Add New Cake</a>
      </div>

      <div class="admin-table-wrapper">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Quantity</th>
              <th>Price</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="cake : ${cakes}">
              <td th:text="${cake.id}">1</td>
              <td>
                <img
                  th:src="${cake.image}"
                  class="admin-thumbnail"
                  alt="Cake image"
                />
              </td>
              <td th:text="${cake.name}">Cake Name</td>
              <td th:text="${cake.category != null ? cake.category.name : ''}">Category</td>
              <td th:text="${cake.quantity}" style="font-weight: bold; text-align: center;">0</td>
              <td th:text="${'$' + cake.price}">$10.00</td>
              <td>
                <div class="admin-actions">
                  <a
                    th:href="@{/admin/cakes/edit/{id}(id=${cake.id})}"
                    class="btn btn-secondary"
                    >Edit</a
                  >
                  <a
                    th:href="@{/admin/cakes/delete/{id}(id=${cake.id})}"
                    class="btn btn-danger"
                    onclick="return confirm('Are you sure?');"
                    >Delete</a
                  >
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </body>
</html>
