<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Manage Cakes - Admin</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <header class="header">
        <div class="container">
            <h1 class="logo">🍰 Admin Dashboard</h1>
            <nav class="nav">
                <a href="/admin/users" class="nav-link">Manage Users</a>
                <a href="/cakes" class="nav-link">Main Site</a>
                <a href="/logout" class="nav-link">Logout</a>
            </nav>
        </div>
    </header>

    <main class="main-content container">
        <h2 class="section-title">Manage Cakes</h2>

      <div class="admin-toolbar">
        <input type="file" id="excelFileInput" style="display: none;" accept=".xlsx, .xls" />
        <button type="button" class="btn btn-secondary" onclick="document.getElementById('excelFileInput').click()" style="margin-right: 15px;">Import Excel</button>
        <a href="/admin/cakes/add" class="btn btn-primary">Add New Cake</a>
      </div>

        <table
            style="width: 100%; border-collapse: collapse; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
            <thead>
                <tr style="background: #2c3e50; color: white;">
                    <th style="padding: 15px;">ID</th>
                    <th style="padding: 15px;">Image</th>
                    <th style="padding: 15px;">Name</th>
                    <th style="padding: 15px;">Category</th>
                    <th style="padding: 15px;">Price</th>
                    <th style="padding: 15px;">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cake : ${cakes}" style="border-bottom: 1px solid #eee;">
                    <td style="padding: 15px;" th:text="${cake.id}">1</td>
                    <td style="padding: 15px;">
                        <img th:src="${cake.image}"
                            style="width: 50px; height: 50px; object-fit: cover; border-radius: 5px;">
                    </td>
                    <td style="padding: 15px;" th:text="${cake.name}">Cake Name</td>
                    <td style="padding: 15px;" th:text="${cake.category}">Category</td>
                    <td style="padding: 15px;" th:text="${'$' + cake.price}">$10.00</td>
                    <td style="padding: 15px;">
                        <a th:href="@{/admin/cakes/edit/{id}(id=${cake.id})}" class="btn btn-secondary"
                            style="font-size: 0.8rem;">Edit</a>
                        <a th:href="@{/admin/cakes/delete/{id}(id=${cake.id})}" class="btn btn-primary"
                            style="font-size: 0.8rem; background: #e74c3c; margin-left: 5px;"
                            onclick="return confirm('Are you sure?')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <!-- Import Excel Modal -->
    <div class="modal-backdrop" id="importModal">
      <div class="modal-container">
        <div class="modal-header">
          <h3>Kết quả kiểm tra file Excel</h3>
          <button class="modal-close" onclick="closeImportModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="modal-summary">
            <div class="summary-card total">
              <span id="modalTotal">0</span>
              Tổng số dòng
            </div>
            <div class="summary-card valid">
              <span id="modalValid">0</span>
              Hợp lệ
            </div>
            <div class="summary-card error">
              <span id="modalError">0</span>
              Lỗi
            </div>
          </div>
          <div class="error-list" id="modalErrorList" style="display: none;">
            <h4>Chi tiết lỗi:</h4>
            <div id="errorItemsContainer"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeImportModal()">Hủy</button>
          <button class="btn btn-primary" id="btnConfirmImport" onclick="commitImport()" style="display: none;">Thêm sản phẩm hợp lệ</button>
        </div>
      </div>
    </div>

    <script>
      let validRowsData = [];

      function closeImportModal() {
          document.getElementById('importModal').classList.remove('show');
      }

      function commitImport() {
          const btn = document.getElementById('btnConfirmImport');
          const originalText = btn.innerHTML;
          btn.innerHTML = '<span class="loading-spinner"></span> Đang xử lý...';
          btn.disabled = true;

          fetch('/api/import/products/commit', {
              method: 'POST',
              headers: {
                  'Content-Type': 'application/json'
              },
              body: JSON.stringify(validRowsData)
          })
          .then(res => res.json())
          .then(commitData => {
              alert(`Đã thêm thành công ${commitData.successCount} sản phẩm!\nThất bại: ${commitData.failedCount}`);
              window.location.reload();
          })
          .catch(err => {
              alert('Đã xảy ra lỗi khi lưu sản phẩm vào database.');
              console.error(err);
              btn.innerHTML = originalText;
              btn.disabled = false;
          });
      }

      document.getElementById('excelFileInput').addEventListener('change', function(e) {
          const file = e.target.files[0];
          if (!file) return;

          const formData = new FormData();
          formData.append('file', file);

          fetch('/api/import/products/preview', {
              method: 'POST',
              body: formData
          })
          .then(response => {
              if (!response.ok) {
                  throw new Error('Network response was not ok');
              }
              return response.json();
          })
          .then(data => {
              const summary = data.summary;
              validRowsData = data.validRows || [];
              
              document.getElementById('modalTotal').textContent = summary.totalRows;
              document.getElementById('modalValid').textContent = summary.validCount;
              document.getElementById('modalError').textContent = summary.errorCount;
              
              const errorList = document.getElementById('modalErrorList');
              const errorContainer = document.getElementById('errorItemsContainer');
              
              if (summary.errorCount > 0 && data.errorRows) {
                  errorList.style.display = 'block';
                  errorContainer.innerHTML = '';
                  data.errorRows.forEach(err => {
                      const div = document.createElement('div');
                      div.className = 'error-item';
                      // Sử dụng thuộc tính rowIndex thay vì rowNumber
                      div.innerHTML = `<span class="row-badge">Dòng ${err.rowIndex}</span> <span>[Mã: ${err.productCode || 'N/A'}] ${err.errorMessage}</span>`;
                      errorContainer.appendChild(div);
                  });
              } else {
                  errorList.style.display = 'none';
              }
              
              const btnConfirm = document.getElementById('btnConfirmImport');
              if (validRowsData.length > 0) {
                  btnConfirm.style.display = 'inline-block';
              } else {
                  btnConfirm.style.display = 'none';
              }
              
              document.getElementById('importModal').classList.add('show');
          })
          .catch(error => {
              alert('Có lỗi xảy ra khi tải lên hoặc đọc file Excel. Vui lòng kiểm tra lại file.');
              console.error(error);
          })
          .finally(() => {
              e.target.value = '';
          });
      });
    </script>
  </body>
</html>
