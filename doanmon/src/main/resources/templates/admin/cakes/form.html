<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Cake - Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="container">
            <h1 class="logo">Admin Dashboard</h1>
            <nav class="nav">
                <a href="/admin/cakes" class="nav-link">Back to List</a>
            </nav>
        </div>
    </header>

    <main class="main-content container">
        <div class="form-container">
            <h2 class="section-title" th:text="${cake.id == null ? 'Add New Cake' : 'Edit Cake'}">Edit Cake</h2>

            <form th:action="@{/admin/cakes/save}" th:object="${cake}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label>Name</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Price</label>
                    <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <input type="text" th:field="*{category}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" th:field="*{image}" class="form-control" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Save Cake</button>
            </form>
        </div>
    </main>

</body>

</html>
