<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <a href="/cakes" class="logo">🍰 Sweet Delights</a>
            <button class="menu-toggle" id="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="nav">
                <a href="/cakes" class="nav-link">Home</a>
                <a href="/cakes" class="nav-link">Menu</a>

    <footer class="footer">

        </div>
    </footer>
