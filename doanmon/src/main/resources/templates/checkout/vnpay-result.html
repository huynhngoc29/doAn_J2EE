<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Result</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <a href="/cakes" class="logo">🍰 Sweet Delights</a>
            <nav class="nav">
                <a href="/cakes" class="nav-link">Home</a>
                <a href="/cakes" class="nav-link">Menu</a>
                <a href="/cart" class="nav-link">Cart <span th:text="${cartSize > 0 ? cartSize : 0}">0</span></a>
            </nav>
        </div>
    </header>

    <main class="main-content container" style="text-align: center; padding: 60px 0;">
        <h2 class="section-title">Payment Result</h2>
        <p th:if="${payment != null}">
            <span th:if="${payment.status == 'PAID'}" style="color: #27ae60; font-weight: 700;">Your payment was successful!</span>
            <span th:if="${payment.status != 'PAID'}" style="color: #e74c3c; font-weight: 700;">Payment failed or was cancelled.</span>
        </p>
        <p th:if="${payment == null}">No order information available.</p>
        <a href="/cakes" class="btn btn-primary" style="margin-top: 20px;">Back to Home</a>
    </main>

    <footer class="footer">
        <div class="container" style="justify-content: center;">
            <p>&copy; 2026 Sweet Delights Cake Shop. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
